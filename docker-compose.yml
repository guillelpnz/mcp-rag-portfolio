services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Pull the model on first start, then serve.
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull llama3.2 && wait"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ollama
      # Point the app at the Ollama container instead of localhost.
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama-models:
