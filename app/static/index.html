<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guillermo Lupiáñez</title>
  <meta name="description" content="Ask anything about Guillermo Lupiáñez's professional experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #ededed;
      --muted: #71717a;
      --border: #1f1f22;
      --border-strong: #3f3f46;
      --accent: #fafafa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 32px 40px;
      min-height: 100vh;
    }
    header {
      font-size: 14px;
    }
    header .name {
      color: var(--fg);
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    header .title {
      color: var(--muted);
      margin-top: 2px;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
    }
    .stage {
      width: 100%;
      max-width: 640px;
    }
    h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 28px;
      color: var(--fg);
    }
    h1 .accent { color: var(--muted); }
    form {
      position: relative;
    }
    input[type="text"] {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      color: var(--fg);
      font-family: inherit;
      font-size: 15px;
      padding: 16px 52px 16px 18px;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.02);
    }
    button.submit {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: var(--fg);
      color: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    button.submit:hover { transform: translateY(-50%) translateX(1px); }
    button.submit:disabled { opacity: 0.4; cursor: default; transform: translateY(-50%); }
    .answer {
      margin-top: 28px;
      font-size: 15px;
      line-height: 1.65;
      color: var(--fg);
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: pre-wrap;
    }
    .answer.visible { opacity: 1; }
    .sources {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
    .loading {
      display: inline-flex;
      gap: 4px;
    }
    .loading span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s infinite ease-in-out;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
    .error { color: #f87171; }
    footer {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 18px;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    footer a:hover { color: var(--fg); }
    @media (max-width: 540px) {
      body { padding: 24px 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="name">Guillermo Lupiáñez</div>
    <div class="title">Backend Engineer · AI &amp; Cloud</div>
  </header>

  <main>
    <div class="stage">
      <h1>Ask me anything <span class="accent">about my work.</span></h1>
      <form id="ask-form" autocomplete="off">
        <input
          type="text"
          id="q"
          name="q"
          placeholder="What did Guillermo do at Plénitas?"
          required
          autofocus
        />
        <button class="submit" id="submit" type="submit" aria-label="Ask">→</button>
      </form>
      <div class="answer" id="answer"></div>
    </div>
  </main>

  <footer>
    <a href="https://github.com/guillelpnz" target="_blank" rel="noopener">github</a>
    <a href="https://linkedin.com/in/guillelpnz" target="_blank" rel="noopener">linkedin</a>
  </footer>

  <script>
    const form = document.getElementById('ask-form');
    const input = document.getElementById('q');
    const submit = document.getElementById('submit');
    const answerEl = document.getElementById('answer');

    function showLoading() {
      answerEl.classList.add('visible');
      answerEl.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    }

    function showError(msg) {
      answerEl.classList.add('visible');
      answerEl.innerHTML = '<div class="error">' + msg + '</div>';
    }

    function renderAnswer(answer, sources) {
      answerEl.classList.remove('visible');
      requestAnimationFrame(() => {
        const text = document.createElement('div');
        text.textContent = answer;
        const srcEl = document.createElement('div');
        srcEl.className = 'sources';
        srcEl.textContent = 'Source: ' + (sources && sources.length ? sources.join(', ') : '—');
        answerEl.innerHTML = '';
        answerEl.appendChild(text);
        answerEl.appendChild(srcEl);
        requestAnimationFrame(() => answerEl.classList.add('visible'));
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      submit.disabled = true;
      showLoading();
      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || ('HTTP ' + res.status));
        }
        const data = await res.json();
        renderAnswer(data.answer, data.sources);
      } catch (err) {
        showError(err.message || 'Something went wrong.');
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
